<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeDeeCity</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="ui-root">
    <!-- Setup Overlay -->
    <div id="setup-overlay" class="overlay">
      <div class="modal">
        <h1>Welcome to ThreeDeeCity</h1>
        <div class="form-group">
          <label for="input-city-name">City Name</label>
          <input type="text" id="input-city-name" value="New Horizon">
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <div class="difficulty-options">
            <button class="diff-btn" data-difficulty="easy">Easy ($50k)</button>
            <button class="diff-btn active" data-difficulty="medium">Medium ($20k)</button>
            <button class="diff-btn" data-difficulty="hard">Hard ($10k)</button>
          </div>
        </div>
        <button id="start-game-btn" class="primary-btn">Found City</button>
      </div>
    </div>

    <header id="stats-bar">
      <div class="stat-item">
        <span class="label">City:</span>
        <span id="city-name" class="value">New Horizon</span>
      </div>
      <div class="stat-item">
        <span class="label">Population:</span>
        <span id="population" class="value">0</span>
      </div>
      <div class="stat-item">
        <span class="label">Money:</span>
        <span id="money" class="value">$10,000</span>
      </div>
      <div class="stat-item">
        <span class="label">Date:</span>
        <span id="game-date" class="value">Jan 1, 2026</span>
      </div>
      <div class="stat-item" title="Average Happiness">
        <span class="label">😊</span>
        <span id="happiness" class="value">50%</span>
      </div>
      <div class="stat-item" title="Average Land Value">
        <span class="label">💎</span>
        <span id="land-value" class="value">50</span>
      </div>
      <div class="stat-item" title="Unemployment Rate">
        <span class="label">💼</span>
        <span id="unemployment" class="value">0%</span>
      </div>
      <div class="stat-item" title="Mayor Approval Rating">
        <span class="label">⭐</span>
        <span id="approval" class="value">50%</span>
      </div>
      <div class="separator vertical"></div>
      
      <!-- HUD Indicators -->
      <div id="hud-indicators">
        <div id="rci-indicator">
          <div class="rci-bar residential" title="Residential Demand">
            <div id="demand-r" class="bar-fill"></div>
          </div>
          <div class="rci-bar commercial" title="Commercial Demand">
            <div id="demand-c" class="bar-fill"></div>
          </div>
          <div class="rci-bar industrial" title="Industrial Demand">
            <div id="demand-i" class="bar-fill"></div>
          </div>
        </div>
        <div id="power-indicator" class="indicator-group">
          <span class="label">Power</span>
          <div class="meter-bg">
            <div id="power-meter-fill" class="meter-fill"></div>
          </div>
        </div>
      </div>

      <div class="separator vertical"></div>

      <!-- Audio Toggle -->
      <div id="audio-container" style="position: relative;">
        <button class="tool-btn" id="audio-toggle" title="Toggle Audio (Right click for Radio)">
          <svg id="audio-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
        <div id="radio-menu" class="context-menu hidden">
          <div class="menu-item" data-station="all">All Songs</div>
          <div class="menu-item" data-station="jazz">Jazz Station</div>
          <div class="menu-item" data-station="japanese">Japanese Radio</div>
        </div>
      </div>

      <div id="time-controls">
        <button class="time-btn" id="time-pause" title="Pause">
          <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
        </button>
        <button class="time-btn active" id="time-play" title="Play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
        </button>
        <button class="time-btn" id="time-fast" title="Fast Forward">
          <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" /></svg>
        </button>
      </div>
    </header>

    <nav id="toolbar">
      <button class="tool-btn active" id="tool-select" title="Select (S)">
        <svg viewBox="0 0 24 24"><path d="M7 2l12 11h-6l2 7-3 1-2-7-3 7V2z" /></svg>
      </button>
      <div class="separator"></div>
      
      <!-- Residential Category -->
      <div class="tool-category" id="cat-residential">
        <button class="tool-btn category-btn" title="Residential Zones">R</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-residential-light" title="Light Residential">R1</button>
          <button class="tool-btn" id="tool-residential-medium" title="Medium Residential">R2</button>
          <button class="tool-btn" id="tool-residential-heavy" title="Heavy Residential">R3</button>
        </div>
      </div>
      
      <!-- Commercial Category -->
      <div class="tool-category" id="cat-commercial">
        <button class="tool-btn category-btn" title="Commercial Zones">C</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-commercial-light" title="Light Commercial">C1</button>
          <button class="tool-btn" id="tool-commercial-medium" title="Medium Commercial">C2</button>
          <button class="tool-btn" id="tool-commercial-heavy" title="Heavy Commercial">C3</button>
        </div>
      </div>
      
      <!-- Industrial Category -->
      <div class="tool-category" id="cat-industrial">
        <button class="tool-btn category-btn" title="Industrial Zones">I</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-industrial-light" title="Light Industrial">I1</button>
          <button class="tool-btn" id="tool-industrial-medium" title="Medium Industrial">I2</button>
          <button class="tool-btn" id="tool-industrial-heavy" title="Heavy Industrial">I3</button>
        </div>
      </div>

      <div class="separator"></div>

      <!-- Infrastructure Category -->
      <div class="tool-category" id="cat-infrastructure">
        <button class="tool-btn category-btn" title="Utilities">⚡</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-power-coal" title="Coal Power Plant ($5,000)">🏭</button>
          <button class="tool-btn" id="tool-power-wind" title="Wind Turbine ($1,000)">🍃</button>
          <button class="tool-btn" id="tool-water-pump" title="Water Pump ($2,500)">💧</button>
        </div>
      </div>

      <!-- Transit Category -->
      <div class="tool-category" id="cat-transit">
        <button class="tool-btn category-btn" title="Mass Transit">🚌</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-highway" title="Highway ($50)">🛣️</button>
          <button class="tool-btn" id="tool-bus-stop" title="Bus Stop ($500)">🚏</button>
          <button class="tool-btn" id="tool-rail-line" title="Rail Line ($100)">🛤️</button>
          <button class="tool-btn" id="tool-rail-station" title="Rail Station ($3,000)">🚉</button>
        </div>
      </div>

      <div class="separator"></div>
      <button class="tool-btn" id="tool-road" title="Build Road (W)">
        <svg viewBox="0 0 24 24"><path d="M11 16v-2h2v2h-2zm1-13C6.48 3 2 7.48 2 13s4.48 10 10 10 10-4.48 10-10S17.52 3 12 3zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13h-1v3h1V8zm0 4h-1v3h1v-3z" /></svg>
      </button>
      <button class="tool-btn" id="tool-power-line" title="Power Line ($5)">
        <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8H7z" /></svg>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-bulldoze" title="Bulldoze (B)">
        <svg viewBox="0 0 24 24"><path d="M22 2l-2.5 1.4L17 2l-1.5 4h-4L10 2 7.5 3.4 5 2 3 7v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-1-5zM9 14h6v2H9v-2z" /></svg>
      </button>
      <div class="separator"></div>
    <!-- Civic Category -->
      <div class="tool-category" id="cat-civic">
        <button class="tool-btn category-btn" title="Civic Services">🏢</button>
        <div class="drawer">
          <button class="tool-btn" id="tool-police" title="Police Station ($1,500)">🚓</button>
          <button class="tool-btn" id="tool-fire" title="Fire Station ($1,500)">🚒</button>
          <button class="tool-btn" id="tool-school" title="School ($2,500)">🏫</button>
          <button class="tool-btn" id="tool-hospital" title="Hospital ($4,000)">🏥</button>
          <button class="tool-btn" id="tool-park" title="Park ($800)">🌳</button>
        </div>
      </div>
      <div class="separator"></div>
      <!-- Data Views -->
      <div class="tool-category" id="cat-data-views">
        <button class="tool-btn category-btn" title="Data Views">👁️</button>
        <div class="drawer">
          <button class="tool-btn view-btn" data-view="none" title="Normal View">❌</button>
          <button class="tool-btn view-btn" data-view="power" title="Power Grid">⚡</button>
          <button class="tool-btn view-btn" data-view="water" title="Water Grid">💧</button>
          <button class="tool-btn view-btn" data-view="police" title="Police Coverage">🚓</button>
          <button class="tool-btn view-btn" data-view="fire" title="Fire Coverage">🚒</button>
          <button class="tool-btn view-btn" data-view="school" title="School Coverage">🏫</button>
          <button class="tool-btn view-btn" data-view="hospital" title="Hospital Coverage">🏥</button>
          <button class="tool-btn view-btn" data-view="park" title="Park Coverage">🌳</button>
        </div>
      </div>
      <div class="separator"></div>
      <!-- Tour Camera -->
      <button class="tool-btn" id="tool-tour" title="Tour City (T)">
        <svg viewBox="0 0 24 24"><path d="M4,4H7L9,2H15L17,4H20A2,2 0 0,1 22,6V18A2,2 0 0,1 20,20H4A2,2 0 0,1 2,18V6A2,2 0 0,1 4,4M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9Z" /></svg>
      </button>
    </nav>
  </div>
  
  <div id="tile-tooltip" class="tooltip hidden">
    <div id="tt-title" class="tt-bold">Residential (Medium)</div>
    <div id="tt-stats">Pop: 150 | Jobs: 0</div>
    <div id="tt-env">Happiness: 80% | Land Val: 65</div>
  </div>

  <div id="notifications-panel"></div>
  
  <div id="minimap-panel">
    <canvas id="minimap-canvas" width="128" height="128"></canvas>
  </div>

  <canvas id="game-canvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>

</html>
