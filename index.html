<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeDeeCity</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="ui-root">
    <header id="stats-bar">
      <div class="stat-item">
        <span class="label">City:</span>
        <span id="city-name" class="value">New Horizon</span>
      </div>
      <div class="stat-item">
        <span class="label">Population:</span>
        <span id="population" class="value">0</span>
      </div>
      <div class="stat-item">
        <span class="label">Money:</span>
        <span id="money" class="value">$10,000</span>
      </div>
      <div class="stat-item">
        <span class="label">Date:</span>
        <span id="game-date" class="value">Jan 1, 2026</span>
      </div>
      <div class="separator vertical"></div>
      <div id="time-controls">
        <button class="time-btn" id="time-pause" title="Pause">
          <svg viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button class="time-btn active" id="time-play" title="Play">
          <svg viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>
        <button class="time-btn" id="time-fast" title="Fast Forward">
          <svg viewBox="0 0 24 24">
            <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
          </svg>
        </button>
      </div>
    </header>

    <nav id="toolbar">
      <button class="tool-btn active" id="tool-select" title="Select (S)">
        <svg viewBox="0 0 24 24">
          <path d="M7 2l12 11h-6l2 7-3 1-2-7-3 7V2z" />
        </svg>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-residential" title="Zone Residential (R)">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
      </button>
      <button class="tool-btn" id="tool-commercial" title="Zone Commercial (C)">
        <svg viewBox="0 0 24 24">
          <path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zM9 18H5v-4h4v4zm10 0h-4v-4h4v4z" />
        </svg>
      </button>
      <button class="tool-btn" id="tool-industrial" title="Zone Industrial (I)">
        <svg viewBox="0 0 24 24">
          <path d="M12 3L2 12h3v8h14v-8h3L12 3zm1 11h-2v2H9v-2H7v-2h2V9h2v2h2v2z" />
        </svg>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-road" title="Build Road (W)">
        <svg viewBox="0 0 24 24">
          <path
            d="M11 16v-2h2v2h-2zm1-13C6.48 3 2 7.48 2 13s4.48 10 10 10 10-4.48 10-10S17.52 3 12 3zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13h-1v3h1V8zm0 4h-1v3h1v-3z" />
        </svg>
      </button>
      <button class="tool-btn" id="tool-power" title="Build Power (P)">
        <svg viewBox="0 0 24 24">
          <path d="M7 2v11h3v9l7-12h-4l4-8H7z" />
        </svg>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" id="tool-bulldoze" title="Bulldoze (B)">
        <svg viewBox="0 0 24 24">
          <path
            d="M22 2l-2.5 1.4L17 2l-1.5 4h-4L10 2 7.5 3.4 5 2 3 7v13c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-1-5zM9 14h6v2H9v-2z" />
        </svg>
      </button>
    </nav>
  </div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>

</html>
